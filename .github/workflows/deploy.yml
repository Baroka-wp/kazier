name: 🚀 Standardized Deploy (PM2)

on:
  push:
    branches: [main]

jobs:
  quality-and-build:
    name: 1. Quality & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Check
        run: |
          npm ci
          npm run lint
          npm run type-check

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      - name: Archiver le build
        run: tar -czf deploy.tar.gz .next public package.json package-lock.json next.config.* prisma

      - name: Transfert vers VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/opt/kazier"

  finalize-deploy:
    name: 2. Execution VPS
    needs: quality-and-build
    runs-on: ubuntu-latest
    steps:
      - name: ⚡ Sync DB & Restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/kazier
            
            # Extraction propre
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            # Installation des dépendances de production
            npm install --omit=dev

            # Synchronisation Prisma avec Neon
            # Utilise le .env déjà présent dans /opt/kazier
            npx prisma db push --accept-data-loss

            # Redémarrage de l'app sur le port 3000
            pm2 reload kazier-app || pm2 start npm --name "kazier-app" -- start -- -p 3000
            
            pm2 save