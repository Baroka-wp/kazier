version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    # ⚠️ Pas de container_name - Coolify le gère automatiquement
    expose:
      - "3000"
    # ⚠️ Pas de ports mappés - Coolify utilise un reverse proxy (Traefik)
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_CHANNEL_ID=${SLACK_CHANNEL_ID}
      - SLACK_BOSS_USER_ID=${SLACK_BOSS_USER_ID}
      - NEXT_PUBLIC_FORM_URL=${NEXT_PUBLIC_FORM_URL}
      - AUTH_URL=${AUTH_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - SKIP_SLACK_SIGNATURE=${SKIP_SLACK_SIGNATURE:-true}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - SLACK_INVITE_LINK=${SLACK_INVITE_LINK}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - BREVO_SMTP_PASSWORD=${BREVO_SMTP_PASSWORD}
      - BREVO_SMTP_USER=${BREVO_SMTP_USER}
      - BLOB_READ_WRITE_TOKEN=${BLOB_READ_WRITE_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ⚠️ Pas de volumes ni networks - Coolify les gère automatiquement
