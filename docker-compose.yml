version: '3.8'

services:
  # Application Next.js
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: kazier-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_CHANNEL_ID=${SLACK_CHANNEL_ID}
      - SLACK_BOSS_USER_ID=${SLACK_BOSS_USER_ID}
      - NEXT_PUBLIC_FORM_URL=${NEXT_PUBLIC_FORM_URL}
      - AUTH_URL=${AUTH_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - kazier-network

  # PostgreSQL Database (optionnel - si vous voulez une DB locale)
  db:
    image: postgres:16-alpine
    container_name: kazier-db
    environment:
      - POSTGRES_USER=kazier
      - POSTGRES_PASSWORD=kazier_password
      - POSTGRES_DB=kazier
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - kazier-network

  # Adminer (Interface DB optionnelle)
  adminer:
    image: adminer:latest
    container_name: kazier-adminer
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - kazier-network

volumes:
  postgres-data:

networks:
  kazier-network:
    driver: bridge
