# Docker Compose pour la PRODUCTION (VPS)
# Utilise l'image depuis GitHub Container Registry (GHCR)

services:
  app:
    image: ${IMAGE}
    container_name: kazier-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_CHANNEL_ID=${SLACK_CHANNEL_ID}
      - SLACK_BOSS_USER_ID=${SLACK_BOSS_USER_ID}
      - NEXT_PUBLIC_FORM_URL=${NEXT_PUBLIC_FORM_URL}
      - SKIP_SLACK_SIGNATURE=${SKIP_SLACK_SIGNATURE}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kazier-network

  db:
    image: postgres:15-alpine
    container_name: kazier-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-kazier}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-kazier}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - kazier-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kazier}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: kazier-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
    networks:
      - kazier-network
    depends_on:
      - db

networks:
  kazier-network:
    driver: bridge

volumes:
  postgres-data:
